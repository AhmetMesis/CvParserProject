<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kariyer Portalı | Akıllı ATS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(192, 132, 252, 0.15), transparent);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            backdrop-filter: blur(20px);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 3rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            background: var(--glass);
            display: block;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        input[type="file"] { display: none; }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #file-name {
            margin-top: -1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--accent-green);
            font-weight: 500;
        }

        /* Results Box */
        #result-box {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            text-align: left;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            color: var(--accent-green);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .assigned-role {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0.5rem 0;
        }

        .match-score {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* Loader */
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="container">
        <h1>Geleceğine Adım At</h1>
        <p>Yapay zeka destekli sistemimiz CV'nizi analiz eder ve sizi en uygun kariyere yönlendirir.</p>

        <label class="upload-area" id="drop-area">
            <span class="upload-icon">🚀</span>
            <span id="upload-text">CV'nizi sürükleyin veya seçin<br><small>(Sadece PDF)</small></span>
            <input type="file" id="cv-file" accept=".pdf">
        </label>
        
        <div id="file-name"></div>

        <button class="btn" id="submit-btn" disabled>Başvuruyu Gönder</button>
        
        <div class="loader" id="loader"></div>

        <div id="result-box">
            <div class="result-title">🎉 Başvurunuz Alındı!</div>
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('cv-file');
        const fileNameDisplay = document.getElementById('file-name');
        const submitBtn = document.getElementById('submit-btn');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('result-box');
        const resultContent = document.getElementById('result-content');
        const uploadText = document.getElementById('upload-text');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileNameDisplay.textContent = "📄 " + this.files[0].name;
                submitBtn.disabled = false;
                uploadText.innerHTML = "Dosya seçildi!";
            }
        });

        submitBtn.addEventListener('click', async function() {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("file", file);

            submitBtn.style.display = 'none';
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:8000/parse-cv/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loader.style.display = 'none';
                
                if (response.ok) {
                    resultBox.style.display = 'block';
                    resultContent.innerHTML = `
                        <p style="margin-bottom:1rem;">Sayın <strong>${data.candidate_name || 'Aday'}</strong>,</p>
                        <div class="assigned-role">${data.ai_decision.assigned_role}</div>
                        <div class="match-score">Eşleşme Oranı: %${data.ai_decision.confidence_score.toFixed(0)}</div>
                        <p style="margin-top:1.5rem; font-size:0.85rem; color:var(--text-muted);">
                            Verileriniz IK ekibimize iletildi. Profiliniz eşleşme barajının üzerinde olduğu için değerlendirmeye alındınız.
                        </p>
                    `;
                } else {
                    alert("Başvuru Hatası: " + (data.detail || "Bir sorun oluştu."));
                    submitBtn.style.display = 'block';
                }
            } catch (error) {
                loader.style.display = 'none';
                submitBtn.style.display = 'block';
                alert("Sunucu hatası! API'nin çalıştığından emin olun.");
            }
        });
    </script>
</body>
</html>
